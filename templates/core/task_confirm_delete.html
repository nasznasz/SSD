{% extends 'core/base.html' %}
{% block content %}
<div class="page-head"><div><h1>Delete Task</h1></div></div>
<div class="card card-pad" style="max-width:560px">
  <p style="margin-top:0">Are you sure you want to delete <strong>{{ task.title }}</strong>? This cannot be undone.</p>
  <form method="POST" class="app-form">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="/tasks/" class="btn btn-subtle">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
