{% extends 'core/base.html' %}
{% block content %}
<h2>Delete Task</h2>
<p>Are you sure you want to delete: <strong>{{ task.title }}</strong>?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/tasks/" class="btn">Cancel</a>
</form>
{% endblock %}
