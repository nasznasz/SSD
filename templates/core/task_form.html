{% extends 'core/base.html' %}
{% block content %}
<div class="page-head"><div><h1>{{ action }} Task</h1></div></div>
<div class="card card-pad" style="max-width:620px">
  <form method="POST" class="app-form">
    {% csrf_token %}
    <div class="form-group"><label>Title</label>{{ form.title }}{{ form.title.errors }}</div>
    <div class="form-group"><label>Description</label>{{ form.description }}{{ form.description.errors }}</div>
    <div class="form-group"><label>Status</label>{{ form.status }}{{ form.status.errors }}</div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ action }} Task</button>
      <a href="/tasks/" class="btn btn-subtle">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
