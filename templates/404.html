<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Not Found</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;color:#1f2430;
    font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(1000px 400px at 50% -10%,#eef1ff,transparent 60%),#f6f7fb}
  .box{text-align:center;background:#fff;border:1px solid #e6e8ee;border-radius:16px;
    padding:48px 40px;box-shadow:0 8px 24px rgba(16,24,40,.06);max-width:420px}
  .code{font-size:3.2rem;font-weight:800;letter-spacing:-.03em;
    background:linear-gradient(135deg,#4f46e5,#7c73ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:1.1rem;margin:6px 0 8px} p{color:#6b7280;margin:0 0 22px;font-size:.92rem}
  a{display:inline-block;background:#4f46e5;color:#fff;text-decoration:none;padding:10px 18px;
    border-radius:9px;font-weight:600;font-size:.9rem} a:hover{background:#4338ca}
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you’re looking for doesn’t exist or has moved.</p>
    <a href="/tasks/">Back to my tasks</a>
  </div>
</body>
</html>
